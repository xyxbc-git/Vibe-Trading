<!DOCTYPE html>
<html lang="zh-CN" class="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>JARVIS Terminal — 贾维斯交易终端</title>
    <style>
      html, body, #root {
        margin: 0;
        padding: 0;
        height: 100%;
        background: #0d1117;
        color: #e6edf3;
        overflow: hidden;
      }
    </style>
    <script>
      // 首帧前注入强调色主题，防止刷新时闪回默认蓝（与 src/lib/theme.ts 的 key/清单保持一致）
      (function () {
        try {
          var t = localStorage.getItem("jarvis-accent");
          var valid = ["emerald", "violet", "amber", "cyber-pink", "silver"];
          if (t && valid.indexOf(t) >= 0) {
            document.documentElement.dataset.accent = t;
          }
        } catch (e) {
          /* ignore */
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
